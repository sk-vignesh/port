name: NSE Price History Backfill

on:
  # Manual trigger — you pick the date range
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD) — default 2026-02-01'
        required: false
        default: '2026-02-01'
      end_date:
        description: 'End date (YYYY-MM-DD) — default yesterday'
        required: false
        default: ''
      skip_existing:
        description: 'Skip dates already in DB (true/false)'
        required: false
        default: 'true'

jobs:
  backfill:
    name: Backfill NSE bhav copies into price_history
    runs-on: ubuntu-latest
    timeout-minutes: 120   # up to ~40 trading days × 2s each = well within limit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Resolve end date (default to yesterday if not supplied)
        id: dates
        run: |
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          if [ -z "$END" ]; then
            END=$(date -d "yesterday" +%Y-%m-%d)
          fi
          echo "start=$START" >> $GITHUB_OUTPUT
          echo "end=$END"     >> $GITHUB_OUTPUT

      - name: Run backfill
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKFILL_START:            ${{ steps.dates.outputs.start }}
          BACKFILL_END:              ${{ steps.dates.outputs.end }}
          SKIP_EXISTING:             ${{ github.event.inputs.skip_existing }}
        run: python scripts/backfill_nse_prices.py
