name: Groww Portfolio Sync

on:
  # Daily at 09:00 IST (03:30 UTC) — credentials come from Supabase, not GitHub Secrets
  schedule:
    - cron: '30 3 * * *'

  # Manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  sync-groww:
    name: Sync Groww → Supabase (all users)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync all users' Groww portfolios
        env:
          # No Groww credentials here — the script reads them from Supabase per-user
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/sync_groww.py
