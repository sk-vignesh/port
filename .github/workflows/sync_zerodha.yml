name: Zerodha Kite Sync

on:
  # Daily at 07:30 IST (02:00 UTC) — after 6am token refresh window
  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:

jobs:
  sync-zerodha:
    name: Sync Zerodha (all users) → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Sync all users' Zerodha portfolios
        env:
          # App-level Kite API key only — secrets are user access tokens stored in Supabase
          ZERODHA_API_KEY:           ${{ secrets.ZERODHA_API_KEY }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/sync_zerodha.py
